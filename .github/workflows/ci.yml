name: "CI: Azure DevOps Extension"

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (TypeScript)
        run: npm run build

      - name: Bundle (esbuild)
        run: npm run bundle

      - name: Trial package (verify tfx creates valid .vsix)
        if: matrix.node-version == 24
        run: npx tfx extension create --manifest-globs vss-extension.json --output-path ./out

      - name: Upload .vsix artifact
        if: matrix.node-version == 24
        uses: actions/upload-artifact@v4
        with:
          name: alcops-ado-extension
          path: out/*.vsix

  publish-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.4.2
        with:
          versionSpec: "6.x"

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.4.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Bundle
        run: npm run bundle

      - name: Stamp task versions
        run: |
          for f in tasks/*/task.json; do
            jq --indent 4 \
              '.version.Minor = ${{ steps.gitversion.outputs.minor }} | .version.Patch = ${{ steps.gitversion.outputs.patch }}' \
              "$f" > tmp.$$ && mv tmp.$$ "$f"
          done

      - name: Publish dev extension
        run: |
          npx tfx extension publish \
            --manifest-globs vss-extension.dev.json \
            --override "{\"version\": \"${{ steps.gitversion.outputs.majorMinorPatch }}\"}" \
            --token ${{ secrets.VISUAL_STUDIO_MARKETPLACE_PAT }}

      - name: Summary
        run: |
          echo "### 🚀 Dev Extension Published" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.gitversion.outputs.majorMinorPatch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Extension:** alcops-ado-dev" >> $GITHUB_STEP_SUMMARY
